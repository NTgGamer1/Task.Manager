<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Task Manager - Free Daily Planner</title>
  <desc id="desc">Organize tasks with priorities, due dates, and progress tracking.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="100%" stop-color="#1f2b12" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="70" y="70" width="1060" height="490" rx="24" fill="#1a1a1a" stroke="#2e2e2e" />

  <text x="120" y="210" fill="#c8f05a" font-family="Space Mono, monospace" font-size="34">task.manager</text>
  <text x="120" y="290" fill="#e8e8e8" font-family="DM Sans, sans-serif" font-size="64" font-weight="700">Free Task Manager App</text>
  <text x="120" y="350" fill="#bdbdbd" font-family="DM Sans, sans-serif" font-size="34">Priority tags, due dates, and daily planning</text>

  <g transform="translate(120,410)">
    <rect width="260" height="56" rx="10" fill="#c8f05a" />
    <text x="20" y="37" fill="#111111" font-family="Space Mono, monospace" font-size="26" font-weight="700">+ Add Tasks</text>
  </g>
  <g transform="translate(410,410)">
    <rect width="180" height="56" rx="10" fill="#2a2a2a" stroke="#3a3a3a" />
    <text x="22" y="37" fill="#e8e8e8" font-family="Space Mono, monospace" font-size="24">Filter</text>
  </g>
  <g transform="translate(620,410)">
    <rect width="220" height="56" rx="10" fill="#2a2a2a" stroke="#3a3a3a" />
    <text x="22" y="37" fill="#e8e8e8" font-family="Space Mono, monospace" font-size="24">Track Progress</text>
  </g>
</svg>
